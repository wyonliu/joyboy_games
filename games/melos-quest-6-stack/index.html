  <canvas id="gameCanvas"></canvas>
  <script>function _showErr(m,s,l){document.title='ERR:'+m;var d=document.createElement('div');d.style.cssText='position:fixed;top:0;left:0;right:0;background:red;color:white;padding:10px;font-size:12px;z-index:9999;word-break:break-all';d.textContent='ERROR: '+m+(s?' at '+s+':'+l:'');document.body.appendChild(d)}window.onerror=function(m,s,l){_showErr(m,s,l)};window.addEventListener('error',function(e){_showErr(e.message,e.filename,e.lineno)});window.addEventListener('unhandledrejection',function(e){_showErr('Promise: '+e.reason)})</script>
  <script type="module" src="/src/main.ts"></script>
